name: Build & Release

on:
  workflow_dispatch:       # 手动触发

permissions:
  contents: write
  workflows: write

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Check upstream changes ──
      - name: Check upstream changes
        id: upstream
        run: |
          git remote add upstream https://github.com/mayswind/AriaNg.git
          git fetch upstream
          git fetch origin --tags
          $sha = git rev-parse upstream/master
          echo "upstream_sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "Upstream commit: $sha"

          if ("${{ github.event_name }}" -eq "schedule") {
            $tag = "built-$sha"
            $exists = git rev-parse "refs/tags/$tag" 2>$null
            if ($LASTEXITCODE -eq 0) {
              echo "No new upstream commits since last build. Skipping."
              echo "skip_build=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            } else {
              echo "New upstream commits found, proceeding."
              echo "skip_build=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            }
          } else {
            echo "Manual trigger, always build."
            echo "skip_build=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Setup Node.js
        if: steps.upstream.outputs.skip_build != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: steps.upstream.outputs.skip_build != 'true'
        run: npm install

      # ── Step 1: Build Standard Version ──
      - name: Build Standard Version
        if: steps.upstream.outputs.skip_build != 'true'
        run: npx gulp clean build

      - name: Package Standard Version (zip)
        if: steps.upstream.outputs.skip_build != 'true'
        run: Compress-Archive -Path dist/* -DestinationPath AriaNg-Standard.zip

      - name: Upload Standard Version artifact
        if: steps.upstream.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: AriaNg-Standard
          path: dist/
          retention-days: 90

      # ── Step 2: Build All-In-One Version ──
      - name: Build All-In-One Version
        if: steps.upstream.outputs.skip_build != 'true'
        run: npx gulp clean build-bundle

      - name: Package All-In-One Version (zip)
        if: steps.upstream.outputs.skip_build != 'true'
        run: Compress-Archive -Path dist/* -DestinationPath AriaNg-AllInOne.zip

      - name: Upload All-In-One artifact
        if: steps.upstream.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: AriaNg-AllInOne
          path: dist/
          retention-days: 90

      # ── Step 3: Package with Pake ──
      - name: Setup Rust
        if: steps.upstream.outputs.skip_build != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install pake-cli
        if: steps.upstream.outputs.skip_build != 'true'
        run: npm install -g pake-cli

      - name: Package with Pake
        if: steps.upstream.outputs.skip_build != 'true'
        run: |
          pake ./dist/index.html --name AriaNg-Pake --use-local-file `
            --width 1500 --height 1000 `
            --icon ./src/favicon.png

      - name: Upload Pake MSI artifact
        if: steps.upstream.outputs.skip_build != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: AriaNg-Pake-x64
          path: AriaNg-Pake.msi
          retention-days: 90

      # ── Step 4: Tag upstream version ──
      - name: Tag built upstream version
        if: steps.upstream.outputs.skip_build != 'true'
        run: |
          git tag built-${{ steps.upstream.outputs.upstream_sha }}
          git push origin built-${{ steps.upstream.outputs.upstream_sha }}

      # ── Step 5: Create Release ──
      - name: Generate version
        id: version
        if: steps.upstream.outputs.skip_build != 'true'
        run: |
          $date = Get-Date -Format "yyyy.MMdd.HHmm"
          echo "version=v$date" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create Release
        if: steps.upstream.outputs.skip_build != 'true' && github.event_name != 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AriaNg-Standard.zip
            AriaNg-AllInOne.zip
            AriaNg-Pake.msi
          tag_name: ${{ steps.version.outputs.version }}
          name: AriaNg-Pake ${{ steps.version.outputs.version }}
          body: |
            ## AriaNg Pake Desktop

            - 构建时间: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - 基于上游 [mayswind/AriaNg](https://github.com/mayswind/AriaNg) commit [${{ steps.upstream.outputs.upstream_sha }}](https://github.com/mayswind/AriaNg/commit/${{ steps.upstream.outputs.upstream_sha }})

            ### 下载

            | 版本 | 文件 | 说明 |
            |---|---|---|
            | **Standard** | `AriaNg-Standard.zip` | 标准版，适用于 Web 服务器部署，按需加载 |
            | **All-In-One** | `AriaNg-AllInOne.zip` | 单文件版，浏览器直接打开即可使用 |
            | **Pake Desktop** | `AriaNg-Pake.msi` | Windows 桌面客户端 |

            ### Pake 桌面版特性
            - 窗口 1500×1000
            - 基于 Rust Tauri 框架，极小内存占用
          draft: false
          prerelease: false
