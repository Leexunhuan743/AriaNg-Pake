name: Build & Release

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 0 * * 0'   # 每周日 UTC 0:00 自动构建
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Step 1: Build Standard Version ──
      - name: Build Standard Version
        run: npx gulp clean build

      - name: Package Standard Version (zip)
        run: Compress-Archive -Path dist/* -DestinationPath AriaNg-Standard.zip

      - name: Upload Standard Version artifact
        uses: actions/upload-artifact@v4
        with:
          name: AriaNg-Standard
          path: dist/
          retention-days: 90

      # ── Step 2: Build All-In-One Version ──
      - name: Build All-In-One Version
        run: npx gulp clean build-bundle

      - name: Package All-In-One Version (zip)
        run: Compress-Archive -Path dist/* -DestinationPath AriaNg-AllInOne.zip

      - name: Upload All-In-One artifact
        uses: actions/upload-artifact@v4
        with:
          name: AriaNg-AllInOne
          path: dist/
          retention-days: 90

      # ── Step 3: Package with Pake ──
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pake-cli
        run: npm install -g pake-cli

      - name: Package with Pake
        run: |
          pake ./dist/index.html --name AriaNg --use-local-file `
            --show-system-tray --width 1500 --height 1000 `
            --icon ./src/favicon.png --dark-mode

      - name: Upload Pake MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: AriaNg-Pake-x64
          path: AriaNg.msi
          retention-days: 90

      # ── Step 4: Create Release ──
      - name: Create Release
        if: github.event_name != 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AriaNg-Standard.zip
            AriaNg-AllInOne.zip
            AriaNg.msi
          tag_name: v${{ github.run_number }}-${{ github.run_attempt }}
          name: AriaNg Pake v${{ github.run_number }}
          body: |
            ## AriaNg Pake Desktop

            - 构建时间: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - 基于上游 [mayswind/AriaNg](https://github.com/mayswind/AriaNg) commit ${{ github.sha }}

            ### 下载

            | 版本 | 文件 | 说明 |
            |---|---|---|
            | **Standard** | `AriaNg-Standard.zip` | 标准版，适用于 Web 服务器部署，按需加载 |
            | **All-In-One** | `AriaNg-AllInOne.zip` | 单文件版，浏览器直接打开即可使用 |
            | **Pake Desktop** | `AriaNg.msi` | Windows 桌面客户端，含系统托盘 |

            ### Pake 桌面版特性
            - 系统托盘支持
            - 窗口 1500×1000
            - 深色模式
            - 基于 Rust Tauri 框架，极小内存占用
          draft: false
          prerelease: false
