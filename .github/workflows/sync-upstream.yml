name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * 1'   # 每周一 UTC 0:00 检查上游更新
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/mayswind/AriaNg.git
          git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          if git merge-base --is-ancestor upstream/master HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Upstream already up-to-date, nothing to do."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "New upstream commits found."
          fi

      - name: Merge upstream into master
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git merge upstream/master --no-edit 2>/dev/null || true
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Merge conflicts detected, auto-resolving..."
            git checkout --theirs .
            git checkout HEAD -- .github/workflows/
            git checkout HEAD -- README.md
            git checkout HEAD -- package.json
            git checkout HEAD -- package-lock.json
            git add .
            git commit --no-edit
          fi
          git push origin master

      - name: Trigger build & release
        if: steps.check.outputs.has_changes == 'true'
        run: |
          gh workflow run build-release.yml --repo ${{ github.repository }} --ref master
